[package]
name = "network-speed-dashboard-nat64-address-preferred-simple"
version = "0.1.0"
edition = "2021"
authors = [ "masx200" ]
description = "A simplified Rust tool for testing Cloudflare HTTP/3 connectivity with DNS over HTTPS support"
license = "MIT"


[[bin]]
name = "simple_test"
path = "src/main_simple.rs"


[dependencies]
serde_json = "1"
anyhow = "1"
http = "0.2"
rand = "0.8"


[dependencies.reqwest]
version = "0.12"
features = [ "json", "rustls-tls", "gzip", "brotli" ]


[dependencies.tokio]
version = "1"
features = [ "full" ]


[dependencies.serde]
version = "1"
features = [ "derive" ]


[dependencies.trust-dns-resolver]
version = "0.23.0-alpha.5"
features = [ "dns-over-https-rustls" ]
